name: Dongchedi Pages

on:
  push:
    branches:
      - main
    paths:
      - scripts/**
      - reports/**
  schedule:
    - cron: "0 1 * * 1"
    - cron: "0 1 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: dongchedi-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Generate daily report
        continue-on-error: true
        run: |
          RUN_DATE="$(date -u +%F)"
          echo "RUN_DATE=$RUN_DATE"
          python scripts/run_dongchedi_daily.py --date "$RUN_DATE" --skip-confluence --no-backfill-missing --refresh-source --refresh-source-timeout 25 --refresh-source-min-successes 0

      - name: Resolve report date
        run: |
          RUN_DATE="$(python - <<'PY'
          from pathlib import Path
          root = Path('reports/dongchedi_daily')
          dates = []
          if root.exists():
            for p in root.iterdir():
              if p.is_dir() and (p / 'filtered.csv').exists():
                dates.append(p.name)
          if not dates:
            raise SystemExit('No report date with filtered.csv found')
          print(sorted(dates)[-1])
          PY
          )"
          echo "RUN_DATE=$RUN_DATE" >> "$GITHUB_ENV"
          echo "Using RUN_DATE=$RUN_DATE"

      - name: Build visualization
        run: |
          python scripts/build_charging_visualizations.py --date "$RUN_DATE"

      - name: Verify dashboard sync with dataset
        run: |
          test -f "reports/dongchedi_daily/$RUN_DATE/filtered.csv"
          test -f "reports/dongchedi_daily/$RUN_DATE/charging_visualization_dashboard.html"
          grep -q "${RUN_DATE}" "reports/dongchedi_daily/$RUN_DATE/charging_visualization_dashboard.html"

      - name: Assemble Pages site
        run: |
          python scripts/build_dongchedi_pages_site.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4