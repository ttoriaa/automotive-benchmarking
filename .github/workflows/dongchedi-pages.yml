name: Dongchedi Pages

on:
  push:
    branches:
      - main
    paths:
      - scripts/**
      - reports/**
  schedule:
    - cron: "0 1 * * 1"
    - cron: "0 1 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: dongchedi-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Generate daily report
        run: |
          python scripts/run_dongchedi_daily.py --date "$(date -u +%F)" --skip-confluence --no-backfill-missing --refresh-source --refresh-source-timeout 25 --refresh-source-min-successes 0

      - name: Build visualization
        run: |
          python scripts/build_charging_visualizations.py

      - name: Assemble Pages site
        run: |
          python scripts/build_dongchedi_pages_site.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4