<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Charging Dashboard</title>

  <style>
    :root {
      --bg1: #fff6eb;
      --bg2: #edf5ff;
      --ink: #12202b;
      --muted: #5d6874;
      --line: rgba(18, 32, 43, 0.14);
      --card: rgba(255, 255, 255, 0.88);
      --accent: #c55300;
      --accent-2: #ff8a00;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(900px 480px at 0% 0%, #ffd9b7 0%, transparent 55%),
        radial-gradient(1000px 520px at 100% 10%, #c4e0ff 0%, transparent 55%),
        linear-gradient(145deg, var(--bg1), var(--bg2));
      min-height: 100vh;
      padding: 20px;
    }
    .shell { max-width: 1280px; margin: 0 auto; }
    .nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 14px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 10px;
      box-shadow: 0 12px 30px rgba(0,0,0,.06);
    }
    .nav a {
      text-decoration: none;
      color: var(--ink);
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      font-weight: 600;
      font-size: 14px;
    }
    .nav a.active {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
    }
    .nav-spacer {
      flex: 1;
    }
    .lang-switch {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .lang-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .lang-btn.active {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
    }
    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 16px 42px rgba(0,0,0,.08);
    }
    h1 { margin: 0 0 8px; font-size: 34px; }
    h2 { margin: 0 0 8px; font-size: 22px; }
    .sub { color: var(--muted); line-height: 1.7; margin: 6px 0 0; }
    .meta { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
    .pill {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; margin-top: 14px; }
    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 14px;
    }
    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      margin-top: 14px;
    }
    table { border-collapse: collapse; width: 100%; font-size: 13px; }
    th, td { border-bottom: 1px solid #edf0f3; padding: 8px 10px; text-align: left; white-space: nowrap; }
    th { position: sticky; top: 0; background: #f8fafc; z-index: 1; }
    .frame {
      width: 100%;
      height: min(78vh, 920px);
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      margin-top: 12px;
    }
    .missing-badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid rgba(93, 104, 116, 0.18);
      background: #eef2f6;
      color: #6b7683;
      font-size: 12px;
      font-weight: 600;
      line-height: 1.2;
    }
    .filter-shell {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 14px;
    }
    .filter-title {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 700;
    }
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      padding: 6px 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .chip select,
    .chip input {
      border: none;
      outline: none;
      background: transparent;
      color: var(--ink);
      font-size: 13px;
      min-width: 110px;
    }
    .chip.search input {
      min-width: 180px;
    }
    .chip-btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--ink);
      padding: 7px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .chip-btn:hover {
      background: #f8fafc;
    }
    .foot { margin-top: 12px; color: var(--muted); font-size: 12px; }
    @media (max-width: 700px) {
      body { padding: 10px; }
      h1 { font-size: 26px; }
      .frame { height: min(68vh, 680px); }
    }
  </style>

</head>
<body>

  <script>
    (function () {
      const page = "dash";
      const totalRows = 0;
      const I18N = {"zh": {"nav_intro": "首页简介", "nav_data": "数据表", "nav_dash": "可视化", "nav_insights": "趋势总结", "intro_title": "EV Charging Benchmarking", "intro_sub": "这是一个电动车充电与电池性能 benchmarking 网站，用于持续对比不同车型在快充速度、续航、电池指标上的表现，支持定期更新与趋势追踪。", "intro_meta_latest": "最新数据日期:", "intro_meta_source": "数据源: 懂车帝参数页 + 日报处理结果", "intro_meta_purpose": "Purpose: 性能对比、选型参考、趋势监控", "intro_card_source_title": "数据源", "intro_card_source_sub": "来自懂车帝车型参数页抓取与日报筛选（纯电、价格阈值）。", "intro_card_bench_title": "Benchmark 维度", "intro_card_bench_sub": "快充时间、充电窗口、高压平台、电池容量、电池能量密度、CLTC续航等。", "intro_card_usage_title": "使用方式", "intro_card_usage_sub": "先看数据表，再看可视化，最后在趋势页查看关键 takeaway。", "intro_foot": "注: 本站采用最新一期数据覆盖发布（适合按月更新），页面 2/3/4 均基于同一期数据构建。", "data_title": "Charging & Battery 参数数据表", "data_sub": "此页展示最新抓取与处理后的 benchmarking 表格，供横向对比和二次分析。该页会随日报定期更新。", "data_meta_date": "数据日期:", "data_meta_rows": "记录数:", "data_meta_file": "数据文件:", "data_filter_title": "筛选", "data_filter_brand": "品牌", "data_filter_power": "动力形式", "data_filter_hv": "高压平台", "data_filter_battery": "电池类型", "data_filter_cell_brand": "电芯品牌", "data_filter_keyword": "模糊搜索", "data_filter_placeholder": "车型/品牌/电池关键字", "data_filter_all": "全部", "data_filter_unknown": "未知", "data_filter_clear": "清空筛选", "data_stat_all": "显示全部 {count} 条记录", "data_stat_filtered": "筛选后显示 {count} 条记录", "dash_title": "可视化 Dashboard", "dash_sub": "该可视化由数据表页同源数据自动生成，用于快速观察车型分布、充电效率与关键指标差异。", "dash_meta_date": "数据日期:", "dash_meta_source": "来源: data.html 同批数据", "ins_title": "趋势总结与 Takeaways", "ins_sub": "基于数据表页与 Dashboard 同批数据，提炼关键趋势与可执行结论，帮助你快速做车型性能 benchmarking 决策。", "ins_meta_date": "数据日期:", "ins_meta_samples": "样本数:", "ins_meta_hv": "800V及以上占比:", "ins_meta_avg_fast": "平均快充时间:", "ins_meta_avg_fast_na": "未明确", "ins_meta_avg_fast_unit": "分钟", "ins_sync_title": "同步结论（来自数据表与 Dashboard 同批数据）", "ins_bubble_title": "品牌分布 Bubble", "ins_fast_title": "最快快充车型（Top 5）", "ins_slow_title": "最慢快充车型（Bottom 5）", "ins_takeaways_title": "Takeaways", "ins_line_1": "样本 {total} 款车型中，800V及以上占比 { ilters", "data_filter_brand": "Brand", "data_filter_power": "Power Type", "data_filter_hv": "HV Platform", "data_filter_battery": "Battery Type", "data_filter_cell_brand": "Cell Brand", "data_filter_keyword": "Keyword Search", "data_filter_placeholder": "Model/brand/battery keyword", "data_filter_all": "All", "data_filter_unknown": "Unknown", "data_filter_clear": "Clear Filters", "data_stat_all": "Showing all {count} rows", "data_stat_filtered": "Showing {count} filtered rows", "dash_title": "Visualization Dashboard", "dash_sub": "This dashboard is generated from the same dataset as the data table, for quick comparison of distribution and charging metrics.", "dash_meta_date": "Data date:", "dash_meta_source": "Source: same batch as data.html", "ins_title": "Insights & Takeaways", "ins_sub": "Based on the same data batch as the table and dashboard, this page highlights actionable trends for EV benchmarking decisions.", "ins_meta_date": "Data date:", "ins_meta_samples": "Samples:", "ins_meta_hv": "800V+ share:", "ins_meta_avg_fast": "Avg fast charge time:", "ins_meta_avg_fast_na": "N/A", "ins_meta_avg_fast_unit": "min", "ins_sync_title": "Aligned Findings (same data batch)", "ins_bubble_title": "Brand Bubble Distribution", "ins_fast_title": "Fastest Charging Models (Top 5)", "ins_slow_title": "Slowest Charging Models (Bottom 5)", "ins_takeaways_title": "Takeaways", "ins_line_1": "Across {total} models, the 800V+ share is {highRatio}%, indicating clear high-voltage platform penetration in this sample.", "ins_line_2": "Average fast-charging time is {avgFast} min, with a median of {medianFast} min.", "ins_line_3": "Average CLTC range is {avgCltc} km, which can be cross-validated with the dashboard distribution.", "ins_rank_brand_label": "Brand:", "ins_rank_fast_label": "Fast charge:", "ins_rank_hv_label": "HV platform:", "ins_rank_minutes": "min", "ins_rank_unknown": "Unknown", "ins_t1_title": "1. High-Voltage Penetration", "ins_t1_sub": "The share of high-voltage platforms is a practical proxy for high-power charging readiness.", "ins_t2_title": "2. Charging Efficiency Gap", "ins_t2_sub": "Large fast-charging differences exist even in similar price ranges; compare with charging window and battery capacity.", "ins_t3_title": "3. Brand Strategy Differences", "ins_t3_sub": "Brands show different trade-offs between battery capacity and charging speed, useful for positioning and competitor analysis."}};

      function currentLang() {
        const saved = localStorage.getItem('site_lang');
        if (saved === 'zh' || saved === 'en') {
          return saved;
        }
        return document.documentElement.lang && document.documentElement.lang.toLowerCase().startsWith('en') ? 'en' : 'zh';
      }

      function t(lang, key) {
        return (I18N[lang] && I18N[lang][key]) || (I18N.zh && I18N.zh[key]) || '';
      }

      function format(template, data) {
        return String(template || '').replace(/\{(\w+)\}/g, function (_, k) {
          return data[k] !== undefined ? String(data[k]) : '';
        });
      }

      function applyDataStat(lang) {
        const stat = document.getElementById('filterStat');
        if (!stat || page !== 'data') {
          return;
        }
        const filteredRows = Number(stat.dataset.filteredRows || totalRows);
        const key = filteredRows === totalRows ? 'data_stat_all' : 'data_stat_filtered';
        stat.textContent = format(t(lang, key), { count: filteredRows });
      }

      function applyInsightTemplates(lang) {
        if (page !== 'insights') {
          return;
        }
        document.querySelectorAll('[data-i18n-template]').forEach(function (el) {
          const key = el.getAttribute('data-i18n-template');
          el.textContent = format(t(lang, key), el.dataset || {});
        });

        const avgFastEl = document.getElementById('insMetaAvgFastValue');
        if (avgFastEl) {
          const val = avgFastEl.dataset.value || '';
          const hasNumber = /^\d+(\.\d+)?$/.test(val);
          avgFastEl.textContent = hasNumber
            ? `${val} ${t(lang, 'ins_meta_avg_fast_unit')}`
            : t(lang, 'ins_meta_avg_fast_na');
        }
      }

      function syncDashboardFrame(lang) {
        if (page !== 'dash') {
          return;
        }
        const frame = document.querySelector('iframe.frame');
        if (!frame) {
          return;
        }
        try {
          const url = new URL(frame.getAttribute('src') || '', window.location.href);
          url.searchParams.set('lang', lang);
          frame.setAttribute('src', url.toString());
        } catch (_err) {
          // Ignore malformed src values.
        }
      }

      function setLang(lang) {
        const zhBtn = document.getElementById('langZhBtn');
        const enBtn = document.getElementById('langEnBtn');
        if (zhBtn) {
          zhBtn.classList.toggle('active', lang === 'zh');
        }
        if (enBtn) {
          enBtn.classList.toggle('active', lang === 'en');
        }

        document.documentElement.lang = lang === 'en' ? 'en' : 'zh-CN';
        document.querySelectorAll('[data-i18n]').forEach(function (el) {
          const key = el.getAttribute('data-i18n');
          const val = t(lang, key);
          if (val) {
            el.textContent = val;
          }
        });
        document.querySelectorAll('[data-i18n-placeholder]').forEach(function (el) {
          const key = el.getAttribute('data-i18n-placeholder');
          const val = t(lang, key);
          if (val) {
            el.setAttribute('placeholder', val);
          }
        });

        applyDataStat(lang);
        applyInsightTemplates(lang);
        localStorage.setItem('site_lang', lang);
        syncDashboardFrame(lang);
        window.dispatchEvent(new CustomEvent('site-lang-changed', { detail: { lang } }));
      }

      window.updateDataStatText = function (visibleRows) {
        const stat = document.getElementById('filterStat');
        if (!stat) {
          return;
        }
        stat.dataset.filteredRows = String(visibleRows);
        applyDataStat(currentLang());
      };

      const zhBtn = document.getElementById('langZhBtn');
      const enBtn = document.getElementById('langEnBtn');
      if (zhBtn) {
        zhBtn.addEventListener('click', function () { setLang('zh'); });
      }
      if (enBtn) {
        enBtn.addEventListener('click', function () { setLang('en'); });
      }

      window.addEventListener('storage', function (e) {
        if (e.key === 'site_lang') {
          setLang(currentLang());
        }
      });

      setLang(currentLang());
    })();
  </script>
