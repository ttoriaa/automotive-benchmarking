<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EV Charging Benchmarking</title>
  <style>
    :root {
      --bg1: #07111f;
      --bg2: #132646;
      --ink: #eaf2ff;
      --muted: #9cb3d5;
      --line: rgba(163, 189, 255, 0.24);
      --card: rgba(11, 18, 32, 0.84);
      --accent: #7a5bff;
      --accent-2: #a76dff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: linear-gradient(145deg, var(--bg1), var(--bg2));
      padding: 24px;
    }
    .shell { max-width: 960px; margin: 0 auto; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 20px 44px rgba(0,0,0,.28);
    }
    h1 { margin: 0 0 8px; font-size: 32px; }
    p { line-height: 1.65; color: var(--muted); }
    .links { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
    .links a {
      color: white;
      text-decoration: none;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="card">
      <h1>EV Charging Benchmarking</h1>
      <p>这是一个可直接访问的首页，已把助手小组件挂载到页面上。你可以直接拖动顶部标题栏来移动它。</p>
      <div class="links">
        <a href="site/index.html">首页简介</a>
        <a href="site/data.html">数据表</a>
        <a href="site/dashboard.html">可视化</a>
        <a href="site/insights.html">趋势总结</a>
      </div>
    </div>
  </div>
  <script src="assistant-widget.js"></script>
</body>
</html>
